appId: com.ccm.desktop
productName: CCM Desktop
copyright: MIT

directories:
  output: dist-electron
  buildResources: build

files:
  - desktop/main.js
  - desktop/preload.js
  - desktop/ccm-backend.exe
  - frontend/dist/**/*

extraResources:
  - from: desktop/ccm-backend.exe
    to: ccm-backend.exe

win:
  target:
    - target: nsis
      arch: [x64]
  icon: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CCM Desktop
